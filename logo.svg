<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield background with blue and green -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003D7A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#003D7A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7FD13B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape -->
  <path d="M 100 20 L 160 50 L 160 110 Q 100 160 100 160 Q 100 160 40 110 L 40 50 Z" fill="url(#shieldGradient)" stroke="none"/>
  
  <!-- S2C text -->
  <text x="100" y="115" font-size="70" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">S2C</text>
</svg>
